<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>General Ledger</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
  <a href="/0">Home</a>
  <a href="/2">Accounts</a>

  <table class="table table-striped">
   <thead>
     <th>ID</th>
     <th>Date/Time</th>
     <th>Debit Account</th>
     <th>Credit Account</th>
     <th>Note</th>
     <th>Amount</th>
   </thead>
   <tbody>
	   <!-- ln30: 30 newest entries -->
	   %s
   </tbody>
  </table>

  <form action="/transactions" method="POST">
      <select required name="debit_account_id">
	      <option value="">Debit</option>
	      <!-- aso -->
	      %s
      </select>
      <select required name="credit_account_id">
	      <option value="">Credit</option>
	      <!-- aso -->
	      %s
      </select>
    <input name="note" required type="text" placeholder="Note"/>
    <input name="amount" required type="number" step="0.01" min="0.01" placeholder="USD 0.00"/>
    <button type="submit">Submit</button>
  </form>
</body>
</html>
