<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>General Ledger</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💰</text></svg>">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
  <a href="/">Home</a>
  <a href="/accounts">Accounts</a>

  <table class="table table-striped">
   <thead>
     <th>ID</th>
     <th>Date/Time</th>
     <th>Debit Account</th>
     <th>Credit Account</th>
     <th>Note</th>
     <th>Amount</th>
   </thead>
   <tbody>
     {{range .entries}}
     <tr>
       <th>{{.ID}}</th>
       <td>{{.CreatedAt.Format "2006-01-02 15:04:05 MST"}}</td>
       <td>{{ index $.accounts .DebitAccountId }}</td>
       <td>{{ index $.accounts .CreditAccountId }}</td>
       <td>{{.Note}}</td>
       <td>${{.Amount}}</td>
     </tr>
     {{end}}
   </tbody>
  </table>

  <form action="/transactions" method="POST">
      <select required name="debit_account_id">
	      <option value="">Debit</option>
	      {{range $k, $v := .accounts }}
	      <option value="{{$k}}">{{$v}}</option>
	      {{end}}
      </select>
      <select required name="credit_account_id">
	      <option value="">Credit</option>
	      {{range $k, $v := .accounts }}
	      <option value="{{$k}}">{{$v}}</option>
	      {{end}}
      </select>
    <input name="note" required type="text" placeholder="Note"/>
    <input name="amount" required type="number" step="0.01" min="0.01" placeholder="USD 0.00"/>
    <button type="submit">Submit</button>
  </form>
</body>
</html>
